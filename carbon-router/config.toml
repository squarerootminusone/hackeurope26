[server]
bind = "0.0.0.0:8080"
timeout_secs = 300
max_body_bytes = 10485760  # 10 MB

[weights]
carbon = 0.7
latency = 0.2
cost = 0.1

[carbon]
poll_interval_secs = 300
use_simulated_fallback = true

# ElectricityMaps — free tier: 50 req/hr, global coverage
# Get a key at https://www.electricitymaps.com/free-tier-api
[carbon.electricity_maps]
api_key = ""
base_url = "https://api.electricitymap.org/v3"

# WattTime — free tier: marginal emissions percentile, global coverage
# Register at https://watttime.org/api-documentation/
[carbon.watttime]
username = ""
password = ""
base_url = "https://api.watttime.org/v3"

# UK Carbon Intensity — free, unlimited, no auth, GB only
# https://carbonintensity.org.uk/
[carbon.uk_carbon_intensity]
enabled = true
base_url = "https://api.carbonintensity.org.uk"

[health]
interval_secs = 30
timeout_secs = 5
unhealthy_threshold = 3

[latency]
probe_interval_secs = 60
probe_path = "/health"

