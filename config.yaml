target:
  repo_url: "https://github.com/geopavlakos/hamer"
  branch: "main"
  paper_url: "https://arxiv.org/abs/2312.05251"
  dataset: "FREIHAND-VAL"
  eval_command: "python eval.py --dataset FREIHAND-VAL --batch_size 16 --num_workers 8"
  accuracy_metrics:
    - "PA-MPJPE"
    - "PA-MPVPE"
    - "F@5mm"
    - "F@15mm"
  paper_baselines:
    PA-MPJPE: 6.0
    PA-MPVPE: 5.7
    F@15mm: 0.990

docker:
  base_image: "hand-tracking:baseline"  # local image with CUDA already present

optimization:
  guide: "guides/default_optimizations.md"
  custom_guide: ""
  max_retries: 3

cloud:
  provider: "gcp"
  project: "data-platform-dev-486916"
  region: "europe-west1"
  zone: "europe-west1-b"
  network: "bench-test"
  subnet: "bench-test-subnet"
  gpu_types: ["NVIDIA L4"]
  container_registry: "europe-west1-docker.pkg.dev/data-platform-dev-486916/bench-test-images"
  sql_instance: "bench-test-eval-db"
  sql_connection_name: "data-platform-dev-486916:europe-west1:bench-test-eval-db"
  sql_host: "35.205.179.231"
  gke_cluster: "bench-test-cluster"
  gcs_bucket: "bench-test-dependencies-data-platform-dev-486916"

benchmark:
  runs_per_config: 3
  warmup_runs: 1
  timeout_minutes: 60
