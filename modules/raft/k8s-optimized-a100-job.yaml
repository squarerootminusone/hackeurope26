apiVersion: batch/v1
kind: Job
metadata:
  name: raft-optimized-a100
  namespace: default
spec:
  backoffLimit: 0
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: raft-bench
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-a100
      restartPolicy: Never
      containers:
      - name: raft
        image: europe-west1-docker.pkg.dev/data-platform-dev-486916/bench-test-images/raft-optimized-slim:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -ex

          echo "==> Checking GCS mount..."
          ls -la /mnt/gcs/ || { echo "ERROR: GCS mount empty"; exit 1; }
          ls /mnt/gcs/models/ || { echo "ERROR: models dir missing"; exit 1; }

          # Create symlinks from CSI-mounted GCS volume
          ln -sf /mnt/gcs/models /app/raft/models
          mkdir -p /app/raft/datasets
          ln -sf /mnt/gcs/datasets/Sintel /app/raft/datasets/Sintel

          # Verify
          echo "==> Verifying data..."
          ls -la /app/raft/models/raft-sintel.pth
          ls /app/raft/datasets/Sintel/training/clean/ | head -5
          ls /app/raft/datasets/Sintel/training/flow/ | head -5

          # Run optimized benchmark
          cd /app/raft
          python eval_optimized.py --model models/raft-sintel.pth --dataset sintel --gpu_accelerator nvidia-tesla-a100 --job_name raft-optimized-a100

          # Persist results to GCS
          cp results/optimized_results.json /mnt/gcs/results/optimized_a100.json || echo "WARN: GCS write failed"
          echo "==> Results saved to GCS"
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: eval-db-credentials
              key: host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: eval-db-credentials
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: eval-db-credentials
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: eval-db-credentials
              key: database
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            cpu: "10"
            memory: "72Gi"
        volumeMounts:
        - name: gcs-data
          mountPath: /mnt/gcs
      volumes:
      - name: gcs-data
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: bench-test-dependencies-data-platform-dev-486916
            mountOptions: "only-dir=raft,implicit-dirs"
