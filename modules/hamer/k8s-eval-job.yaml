---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hamer-bench
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: hamer-bench@data-platform-dev-486916.iam.gserviceaccount.com

---
apiVersion: batch/v1
kind: Job
metadata:
  name: hamer-baseline-slim
  namespace: default
spec:
  backoffLimit: 0
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: hamer-bench
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      containers:
        - name: hamer
          image: europe-west1-docker.pkg.dev/data-platform-dev-486916/bench-test-images/hamer-baseline-slim:latest
          env:
            - name: PYOPENGL_PLATFORM
              value: osmesa
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "7"
              memory: 28Gi
              ephemeral-storage: 10Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "7"
              memory: 28Gi
              ephemeral-storage: 10Gi
          volumeMounts:
            - name: gcs-deps
              mountPath: /mnt/gcs
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: gcs-deps
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: true
            volumeAttributes:
              bucketName: bench-test-dependencies-data-platform-dev-486916
              mountOptions: "only-dir=hamer,implicit-dirs"
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
