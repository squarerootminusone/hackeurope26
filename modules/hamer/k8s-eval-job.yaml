          env:
            - name: PYOPENGL_PLATFORM
              value: osmesa
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "7"
              memory: 28Gi
              ephemeral-storage: 10Gi
            requests:
              nvidia.com/gpu: "1"
